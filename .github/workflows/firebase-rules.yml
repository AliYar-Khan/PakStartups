name: Deploy Firebase Security Rules and Indexes

on:
  push:
    branches:
      - main
    paths:
      - "pakstartups/firestore.rules"
      - "pakstartups/storage.rules"
      - "pakstartups/database.rules.json"
      - "pakstartups/firestore.indexes.json"
      - "pakstartups/firebase.json"
      - ".github/workflows/firebase-rules.yml"
  workflow_dispatch:

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
        
      - name: Deploy Firebase Rules and Indexes
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only firestore:rules,firestore:indexes
        working-directory: ./pakstartups
